
language = "C"
header = """/*
 * libobj.h - C ABI for the obj embedded document database.
 *
 * AUTO-GENERATED by cbindgen from crates/libobj/src/<modules>.rs.
 * Do NOT edit by hand: re-run cargo build -p libobj to
 * regenerate this file. A header_drift test in
 * crates/libobj/tests/header_drift.rs fails CI if the
 * committed copy disagrees with the freshly-generated output.
 *
 * Power-of-ten Rule 8: this header is the surface of the obj
 * unsafe boundary. Every function below has a documented
 * safety contract on the Rust side; consumers MUST observe the
 * pointer-ownership conventions noted in the docstrings.
 */"""
trailer = ""
include_guard = "LIBOBJ_H"
pragma_once = true
autogen_warning = "/* AUTO-GENERATED — do not edit; regenerate via `cargo build -p libobj`. */"
include_version = false
no_includes = false
cpp_compat = true
sys_includes = ["stdbool.h", "stdint.h", "stddef.h"]
sort_by = "Name"
style = "type"
documentation = true
documentation_style = "doxy"

[parse]
parse_deps = false

[export]
prefix = ""
item_types = ["constants", "functions", "structs", "enums", "typedefs", "opaque"]

[export.rename]

[fn]
prefix = ""
sort_by = "Name"

[struct]
derive_eq = false

[enum]
prefix_with_name = false
rename_variants = "QualifiedScreamingSnakeCase"
